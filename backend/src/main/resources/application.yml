spring:
  application:
    name: spring-alpha-backend
  
  # PostgreSQL (Neon) Configuration
  datasource:
    url: jdbc:postgresql://ep-super-night-a1grbtke-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
    username: ${NEON_USERNAME:neondb_owner}
    password: ${NEON_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000       # 30s 连接超时
      idle-timeout: 120000            # 2m 空闲超时（避免 Neon/pooler 提前收走）
      max-lifetime: 240000            # 4m 最大生命周期，短于托管库常见连接回收窗口
      keepalive-time: 30000           # 30s 心跳，降低 closed connection 噪音
      minimum-idle: 1                 # 最小空闲连接
      maximum-pool-size: 10           # 最大连接数
  
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
app:
  # BYOK provider: siliconflow | openai | gemini
  ai-provider: siliconflow

  siliconflow:
    api-key: ${SILICONFLOW_API_KEY:}
    model: ${SILICONFLOW_MODEL:Pro/moonshotai/Kimi-K2.6}
    base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
  
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.2}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-pro}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

  # Production analysis path. Spring Boot always delegates report generation to
  # Python Research Service and does not provide a Java report-generation fallback.
  research-service:
    base-url: ${RESEARCH_SERVICE_BASE_URL:http://127.0.0.1:8090}
    timeout: ${RESEARCH_SERVICE_TIMEOUT:PT75S}
  
  # Financial Modeling Prep API Configuration (experimental only; no longer on the main path)
  fmp:
    api-key: ${FMP_API_KEY:}
    api-keys: ${FMP_API_KEYS:}
    base-url: https://financialmodelingprep.com/stable
    cache:
      facts-ttl: PT6H
      history-ttl: PT24H

  yfinance:
    python-executable: ${PYTHON_BIN:python3}
    cache-ttl: PT6H
    execution-timeout: PT20S
  
  sec:
    data-base-url: https://data.sec.gov
    www-base-url: https://www.sec.gov
    user-agent: ${SEC_USER_AGENT:SpringAlpha/1.0 (contact@springalpha.com)}
    cache:
      facts-ttl: PT6H
      history-ttl: PT24H
      ticker-map-ttl: PT24H

  hybrid:
    cache:
      facts-ttl: PT6H
      history-ttl: PT24H

server:
  port: 8081

logging:
  level:
    root: INFO
    com.springalpha: DEBUG
