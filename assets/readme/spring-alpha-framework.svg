<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Spring Alpha multi-agent framework</title>
  <desc id="desc">Data sources flow into Spring Boot, Python research service, three specialized agents, and the Next.js workbench.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/></filter>
    <style>
      .bg{fill:#070b11}.title{font:700 34px Inter,Arial,sans-serif;fill:#f8fafc}.sub{font:500 17px Inter,Arial,sans-serif;fill:#94a3b8}.label{font:700 24px Inter,Arial,sans-serif;fill:#f8fafc}.small{font:600 15px Inter,Arial,sans-serif;fill:#cbd5e1}.tiny{font:500 13px Inter,Arial,sans-serif;fill:#64748b}.dark{fill:url(#panel);stroke:#334155;stroke-width:2}.chip{fill:#0f172a;stroke:#334155;stroke-width:1.5}.flow{fill:none;stroke:#94a3b8;stroke-width:3;marker-end:url(#arrow)}.accent{stroke:#22c55e;stroke-width:4;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="520" rx="0"/>
  <text x="54" y="58" class="title">Spring Alpha Framework</text>
  <text x="54" y="86" class="sub">Ticker-first earnings research: SEC evidence, metric facts, LangGraph agents, and an auditable UI timeline.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="125" width="360" height="315" rx="24" class="dark"/>
    <text x="82" y="165" class="label">Evidence Inputs</text>
    <g transform="translate(82 195)">
      <rect width="290" height="54" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
      <text x="22" y="34" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#111827">SEC filings</text>
      <text x="166" y="34" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#92400e">10-K / 10-Q</text>
    </g>
    <g transform="translate(82 265)">
      <rect width="290" height="54" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
      <text x="22" y="34" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#111827">SEC companyfacts</text>
    </g>
    <g transform="translate(82 335)">
      <rect width="290" height="54" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
      <text x="22" y="34" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#111827">Yahoo enrichment</text>
    </g>
  </g>

  <path class="flow" d="M410 282 C455 282 455 282 500 282"/>

  <g filter="url(#shadow)">
    <rect x="500" y="95" width="420" height="375" rx="28" fill="#0b1220" stroke="#22c55e" stroke-width="3"/>
    <text x="532" y="140" class="label">Research Service</text>
    <text x="532" y="166" class="sub">FastAPI sidecar for tool execution and synthesis</text>
    <g transform="translate(535 200)">
      <rect width="350" height="62" rx="16" fill="url(#green)" opacity="0.95"/>
      <text x="28" y="30" font-family="Inter,Arial" font-size="21" font-weight="800" fill="#052e16">LangGraph Runtime</text>
      <text x="28" y="49" font-family="Inter,Arial" font-size="13" font-weight="800" fill="#166534">tool-calling graph</text>
    </g>
    <g transform="translate(535 282)">
      <rect width="160" height="78" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
      <text x="24" y="33" class="small">LlamaIndex</text>
      <text x="24" y="57" class="tiny">RAG tool</text>
      <rect x="190" width="160" height="78" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
      <text x="214" y="33" class="small">Metric facts</text>
      <text x="214" y="57" class="tiny">SEC + Yahoo</text>
    </g>
    <g transform="translate(535 382)">
      <rect width="350" height="48" rx="14" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
      <text x="28" y="31" class="small">OpenAI-compatible provider synthesis</text>
    </g>
  </g>

  <path class="accent" d="M920 282 C965 282 965 282 1010 282"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="95" width="260" height="375" rx="28" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
    <text x="1042" y="140" class="label">Agent Team</text>
    <g transform="translate(1042 180)">
      <rect width="196" height="70" rx="18" fill="url(#blue)"/>
      <text x="24" y="34" font-family="Inter,Arial" font-size="19" font-weight="800" fill="#0f172a">Earnings</text>
      <text x="24" y="55" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#1e3a8a">quarter verdict</text>
    </g>
    <g transform="translate(1042 270)">
      <rect width="196" height="70" rx="18" fill="url(#green)"/>
      <text x="24" y="34" font-family="Inter,Arial" font-size="19" font-weight="800" fill="#0f172a">Business</text>
      <text x="24" y="55" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#14532d">driver map</text>
    </g>
    <g transform="translate(1042 360)">
      <rect width="196" height="70" rx="18" fill="url(#orange)"/>
      <text x="24" y="34" font-family="Inter,Arial" font-size="19" font-weight="800" fill="#0f172a">Cash Flow</text>
      <text x="24" y="55" font-family="Inter,Arial" font-size="13" font-weight="700" fill="#78350f">capital allocation</text>
    </g>
  </g>

  <path class="flow" d="M1270 282 C1318 282 1318 282 1366 282"/>

  <g filter="url(#shadow)">
    <rect x="1366" y="125" width="184" height="315" rx="28" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
    <text x="1396" y="170" class="label">Workbench</text>
    <text x="1396" y="205" class="small">Market chart</text>
    <text x="1396" y="236" class="small">Reports</text>
    <text x="1396" y="267" class="small">Timeline</text>
    <text x="1396" y="298" class="small">RAG telemetry</text>
    <rect x="1396" y="330" width="120" height="54" rx="16" fill="#dbeafe"/>
    <text x="1420" y="365" font-family="Inter,Arial" font-size="19" font-weight="800" fill="#1d4ed8">Next.js</text>
  </g>
</svg>
