<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Spring Alpha product workbench</title>
  <desc id="desc">Ticker input, provider controls, agent pipeline, messages and tools timeline, market chart, reports, and live RAG telemetry in one workbench.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .bg{fill:url(#bg)}
      .window{fill:#0b1220;stroke:#334155;stroke-width:2}
      .panel{fill:#0f172a;stroke:#334155;stroke-width:2}
      .panelSoft{fill:#111827;stroke:#334155;stroke-width:1.5}
      .title{font:800 38px Inter,Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 17px Inter,Arial,sans-serif;fill:#94a3b8}
      .label{font:800 16px Inter,Arial,sans-serif;fill:#e2e8f0}
      .small{font:600 13px Inter,Arial,sans-serif;fill:#94a3b8}
      .tiny{font:700 12px Inter,Arial,sans-serif;fill:#64748b}
      .value{font:800 18px Inter,Arial,sans-serif;fill:#f8fafc}
      .green{fill:#34d399}
      .amber{fill:#fbbf24}
      .blue{fill:#60a5fa}
      .red{fill:#fb7185}
      .line{fill:none;stroke:#60a5fa;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .grid{stroke:#1e293b;stroke-width:1}
      .mutedLine{stroke:#475569;stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="1600" height="760"/>
  <text x="60" y="72" class="title">Ticker-First Research Workbench</text>
  <text x="60" y="104" class="sub">One input starts the full sequence: market context first, then agent reports, tool timeline, and live EvidencePack telemetry.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="138" width="1480" height="560" rx="30" class="window"/>
    <rect x="60" y="138" width="1480" height="72" rx="30" fill="#111827"/>
    <rect x="60" y="182" width="1480" height="28" fill="#111827"/>
    <circle cx="98" cy="174" r="8" fill="#fb7185"/>
    <circle cx="126" cy="174" r="8" fill="#fbbf24"/>
    <circle cx="154" cy="174" r="8" fill="#34d399"/>

    <rect x="210" y="158" width="320" height="36" rx="18" fill="#020617" stroke="#334155" stroke-width="1.5"/>
    <text x="232" y="181" class="small">NVDA</text>
    <text x="430" y="181" class="tiny">NVIDIA Corporation</text>
    <rect x="548" y="158" width="210" height="36" rx="18" fill="#020617" stroke="#334155" stroke-width="1.5"/>
    <text x="570" y="181" class="small">SiliconFlow</text>
    <rect x="776" y="158" width="130" height="36" rx="18" fill="url(#accent)"/>
    <text x="809" y="181" font-family="Inter,Arial" font-size="13" font-weight="900" fill="#020617">Analyze</text>

    <rect x="92" y="238" width="320" height="420" rx="24" class="panel"/>
    <text x="122" y="278" class="label">Agent Pipeline</text>

    <g transform="translate(122 305)">
      <rect width="250" height="58" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
      <circle cx="28" cy="29" r="10" class="blue"/>
      <text x="50" y="25" class="label">Earnings</text>
      <text x="50" y="45" class="tiny">Latest Earnings Readout</text>
    </g>
    <g transform="translate(122 378)">
      <rect width="250" height="58" rx="18" fill="#052e16" stroke="#34d399" stroke-width="2"/>
      <circle cx="28" cy="29" r="10" class="green"/>
      <text x="50" y="25" class="label">Business Driver</text>
      <text x="50" y="45" class="tiny">Driver Deep Dive</text>
    </g>
    <g transform="translate(122 451)">
      <rect width="250" height="58" rx="18" fill="#451a03" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="28" cy="29" r="10" class="amber"/>
      <text x="50" y="25" class="label">Cash Flow</text>
      <text x="50" y="45" class="tiny">Capital Allocation</text>
    </g>

    <rect x="122" y="538" width="250" height="92" rx="18" class="panelSoft"/>
    <text x="146" y="568" class="label">Messages &amp; Tools</text>
    <text x="146" y="595" class="small">00:01 Reasoning</text>
    <text x="262" y="595" class="tiny">Kimi-K2.6</text>
    <text x="146" y="620" class="small">00:03 Tool</text>
    <text x="228" y="620" class="tiny">get_company_facts</text>

    <rect x="444" y="238" width="696" height="420" rx="24" fill="url(#chart)" stroke="#334155" stroke-width="2"/>
    <text x="476" y="278" class="label">Default View: Market Chart</text>
    <text x="476" y="304" class="small">Switches to the selected agent report after the user clicks a report tab.</text>

    <g transform="translate(476 335)">
      <line x1="0" y1="40" x2="620" y2="40" class="grid"/>
      <line x1="0" y1="100" x2="620" y2="100" class="grid"/>
      <line x1="0" y1="160" x2="620" y2="160" class="grid"/>
      <line x1="0" y1="220" x2="620" y2="220" class="grid"/>
      <line x1="80" y1="0" x2="80" y2="260" class="grid"/>
      <line x1="200" y1="0" x2="200" y2="260" class="grid"/>
      <line x1="320" y1="0" x2="320" y2="260" class="grid"/>
      <line x1="440" y1="0" x2="440" y2="260" class="grid"/>
      <line x1="560" y1="0" x2="560" y2="260" class="grid"/>
      <path class="line" d="M0 205 C58 165 92 188 130 132 C174 68 212 118 248 92 C306 50 360 105 405 78 C462 44 506 70 548 38 C578 18 602 32 620 24"/>
      <g opacity="0.95">
        <rect x="38" y="145" width="10" height="55" rx="4" class="green"/>
        <line x1="43" y1="125" x2="43" y2="218" class="mutedLine"/>
        <rect x="118" y="108" width="10" height="72" rx="4" class="blue"/>
        <line x1="123" y1="88" x2="123" y2="194" class="mutedLine"/>
        <rect x="202" y="90" width="10" height="64" rx="4" class="red"/>
        <line x1="207" y1="70" x2="207" y2="170" class="mutedLine"/>
        <rect x="296" y="88" width="10" height="78" rx="4" class="green"/>
        <line x1="301" y1="60" x2="301" y2="188" class="mutedLine"/>
        <rect x="386" y="66" width="10" height="68" rx="4" class="blue"/>
        <line x1="391" y1="42" x2="391" y2="150" class="mutedLine"/>
        <rect x="492" y="52" width="10" height="80" rx="4" class="green"/>
        <line x1="497" y1="30" x2="497" y2="148" class="mutedLine"/>
        <rect x="584" y="34" width="10" height="70" rx="4" class="blue"/>
        <line x1="589" y1="18" x2="589" y2="122" class="mutedLine"/>
      </g>
    </g>

    <rect x="1172" y="238" width="328" height="194" rx="24" class="panel"/>
    <text x="1202" y="278" class="label">Selected Report</text>
    <rect x="1202" y="304" width="124" height="28" rx="14" fill="#172554" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="1220" y="323" class="tiny">Earnings</text>
    <rect x="1202" y="350" width="250" height="12" rx="6" fill="#334155"/>
    <rect x="1202" y="374" width="220" height="12" rx="6" fill="#334155"/>
    <rect x="1202" y="398" width="270" height="12" rx="6" fill="#334155"/>

    <rect x="1172" y="464" width="328" height="194" rx="24" class="panel"/>
    <text x="1202" y="504" class="label">Live RAG Telemetry</text>
    <g transform="translate(1202 530)">
      <text x="0" y="0" class="tiny">Evidence retrieved</text>
      <text x="210" y="0" class="value">18</text>
      <text x="0" y="34" class="tiny">Evidence used</text>
      <text x="210" y="34" class="value">9</text>
      <text x="0" y="68" class="tiny">Metric facts</text>
      <text x="210" y="68" class="value">12</text>
      <text x="0" y="102" class="tiny">Retrieval latency</text>
      <text x="190" y="102" class="value">420ms</text>
    </g>
  </g>
</svg>
