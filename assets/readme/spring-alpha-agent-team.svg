<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">Spring Alpha agent team</title>
  <desc id="desc">Three task-specific agents produce earnings, business driver, and cash flow reports without debate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/></filter>
    <style>
      .bg{fill:url(#bg)}.title{font:800 40px Inter,Arial,sans-serif;fill:#f8fafc}.sub{font:500 18px Inter,Arial,sans-serif;fill:#94a3b8}.card{fill:#0f172a;stroke:#475569;stroke-width:2}.name{font:800 28px Inter,Arial,sans-serif;fill:#f8fafc}.goal{font:700 15px Inter,Arial,sans-serif;fill:#64748b}.body{font:600 15px Inter,Arial,sans-serif;fill:#cbd5e1}.chip{font:800 14px Inter,Arial,sans-serif;fill:#0f172a}.muted{font:500 13px Inter,Arial,sans-serif;fill:#94a3b8}.line{stroke:#334155;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1600" height="620"/>
  <text x="64" y="72" class="title">Agent Team</text>
  <text x="64" y="104" class="sub">No debate, no trading execution. Each agent answers one research question with bounded tools and typed sections.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="155" width="450" height="365" rx="26" class="card"/>
    <rect x="98" y="185" width="92" height="92" rx="20" fill="url(#blue)"/>
    <text x="122" y="243" font-family="Inter,Arial" font-size="42" font-weight="800" fill="#1e3a8a">E</text>
    <text x="215" y="210" class="name">Latest Earnings</text>
    <text x="215" y="238" class="goal">Goal:</text>
    <text x="270" y="238" class="body">Was the latest quarter good?</text>
    <line x1="98" y1="305" x2="492" y2="305" class="line"/>
    <rect x="98" y="333" width="394" height="135" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
    <text x="122" y="365" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#334155">Key Points Summary:</text>
    <text x="122" y="402" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#111827">Earnings Verdict</text>
    <text x="122" y="432" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">Company profile, KPI strip, what changed,</text>
    <text x="122" y="456" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">and watch-next risks from filing evidence.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="155" width="450" height="365" rx="26" class="card"/>
    <rect x="603" y="185" width="92" height="92" rx="20" fill="url(#green)"/>
    <text x="627" y="243" font-family="Inter,Arial" font-size="42" font-weight="800" fill="#14532d">B</text>
    <text x="720" y="210" class="name">Business Driver</text>
    <text x="720" y="238" class="goal">Goal:</text>
    <text x="775" y="238" class="body">What is really driving growth?</text>
    <line x1="603" y1="305" x2="997" y2="305" class="line"/>
    <rect x="603" y="333" width="394" height="135" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="3"/>
    <text x="627" y="365" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#334155">Key Points Summary:</text>
    <text x="627" y="402" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#111827">Driver Map</text>
    <text x="627" y="432" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">Product, segment, demand, pricing, customer,</text>
    <text x="627" y="456" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">and strategy signals with durability judgment.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="155" width="450" height="365" rx="26" class="card"/>
    <rect x="1108" y="185" width="92" height="92" rx="20" fill="url(#amber)"/>
    <text x="1132" y="243" font-family="Inter,Arial" font-size="42" font-weight="800" fill="#78350f">C</text>
    <text x="1225" y="210" class="name">Cash Flow</text>
    <text x="1225" y="238" class="goal">Goal:</text>
    <text x="1280" y="238" class="body">Are earnings backed by cash?</text>
    <line x1="1108" y1="305" x2="1502" y2="305" class="line"/>
    <rect x="1108" y="333" width="394" height="135" rx="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="3"/>
    <text x="1132" y="365" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#334155">Key Points Summary:</text>
    <text x="1132" y="402" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#111827">Capital Allocation</text>
    <text x="1132" y="432" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">OCF, capex, buybacks, dividends, debt,</text>
    <text x="1132" y="456" font-family="Inter,Arial" font-size="15" font-weight="600" fill="#475569">liquidity, allocation discipline, and red flags.</text>
  </g>

  <g transform="translate(370 550)">
    <rect width="860" height="46" rx="23" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="34" y="30" class="muted">Shared runtime: tool policy -> evidence memory -> final synthesis -> schema validation -> user-facing report</text>
  </g>
</svg>
