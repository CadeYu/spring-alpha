services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.vultr
    env_file:
      - ./.env.vultr
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RESEARCH_SERVICE_BASE_URL: http://research-service:8090
      RESEARCH_SERVICE_TIMEOUT: PT300S
      SPRING_DATASOURCE_MAX_POOL_SIZE: "2"
      PYTHON_BIN: /opt/backend-venv/bin/python
    expose:
      - "8081"
    depends_on:
      research-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  research-service:
    build:
      context: ../../src/research-service
      dockerfile: Dockerfile
    env_file:
      - ./.env.vultr
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
